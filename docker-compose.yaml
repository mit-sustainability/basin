version: '2'

services:
  dagster-webserver:
    image: ${DAGSTER_IMAGE}
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - PG_WAREHOUSE_HOST=${PG_WAREHOUSE_HOST}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - DWRHS_HOST=${DWRHS_HOST}
      - DWRHS_USER=${DWRHS_USER}
      - DWRHS_PASSWORD=${DWRHS_PASSWORD}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DATAHUB_API_KEY=${DATAHUB_API_KEY}
      - FOOD_API_ENDPOINT=${FOOD_API_ENDPOINT}
      - EM_WAREHOUSE_HOST=${EM_WAREHOUSE_HOST}
      - EM_USER=${EM_USER}
      - EM_PASSWORD=${EM_PASSWORD}
      - ECS_CLUSTER=${ECS_CLUSTER}
      - ECS_TASK_DEFINITION=${ECS_TASK_DEFINITION}
      - ECS_CONTAINER_NAME=${ECS_CONTAINER_NAME}
      - ECS_SUBNET_IDS=${ECS_SUBNET_IDS}
      - ECS_SECURITY_GROUP_IDS=${ECS_SECURITY_GROUP_IDS}
      - ECS_ASSIGN_PUBLIC_IP=${ECS_ASSIGN_PUBLIC_IP}
      - ECS_CAPACITY_PROVIDER_STRATEGY=${ECS_CAPACITY_PROVIDER_STRATEGY}
      - MBTA_TRANSIT_USERNAME=${MBTA_TRANSIT_USERNAME}
      - MBTA_TRANSIT_PASSWORD=${MBTA_TRANSIT_PASSWORD}
    ports:
      - 3000:3000
  dagster-daemon:
    image: ${DAGSTER_IMAGE}
    ulimits:
      nproc: 8192
      nofile:
        soft: 32768
        hard: 32768
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - PG_WAREHOUSE_HOST=${PG_WAREHOUSE_HOST}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - DWRHS_HOST=${DWRHS_HOST}
      - DWRHS_USER=${DWRHS_USER}
      - DWRHS_PASSWORD=${DWRHS_PASSWORD}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DATAHUB_API_KEY=${DATAHUB_API_KEY}
      - FOOD_API_ENDPOINT=${FOOD_API_ENDPOINT}
      - EM_WAREHOUSE_HOST=${EM_WAREHOUSE_HOST}
      - EM_USER=${EM_USER}
      - EM_PASSWORD=${EM_PASSWORD}
      - ECS_CLUSTER=${ECS_CLUSTER}
      - ECS_TASK_DEFINITION=${ECS_TASK_DEFINITION}
      - ECS_CONTAINER_NAME=${ECS_CONTAINER_NAME}
      - ECS_SUBNET_IDS=${ECS_SUBNET_IDS}
      - ECS_SECURITY_GROUP_IDS=${ECS_SECURITY_GROUP_IDS}
      - ECS_ASSIGN_PUBLIC_IP=${ECS_ASSIGN_PUBLIC_IP}
      - ECS_CAPACITY_PROVIDER_STRATEGY=${ECS_CAPACITY_PROVIDER_STRATEGY}
      - MBTA_TRANSIT_USERNAME=${MBTA_TRANSIT_USERNAME}
      - MBTA_TRANSIT_PASSWORD=${MBTA_TRANSIT_PASSWORD}
    command: "dagster-daemon run"
