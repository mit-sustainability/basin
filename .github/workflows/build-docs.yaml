name: Build Data Catalog
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Build the docs
  build:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: "Step 01 - Checkout current branch"
        id: step-01
        uses: actions/checkout@v4

      - name: "Step 02 - Install uv"
        id: step-02
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: "Step 03 - Install dependencies"
        id: step-03
        run: |
          uv sync --frozen
          mkdir -p ~/.dbt && cp warehouse/profiles.yml ~/.dbt/profiles.yml

      - name: "Step 04 - Install dbt packages"
        id: step-04
        run: uv run dbt deps --project-dir warehouse --profiles-dir warehouse

      - name: "Step 05 - Verify dbt"
        id: step-05
        run: uv run dbt --version

      - name: "Step 06 - Generate dbt docs"
        id: step-06
        working-directory: ./warehouse
        env:
          PG_WAREHOUSE_HOST: ${{ secrets.PG_WAREHOUSE_HOST }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
        run: |
          uv run dbt docs generate -t docs
          cp docstyle.css target/
          cp MITOS_globe.png target/
          cd target
          echo $PWD
          sed -i 's|<head>|<head>\n\t<link rel="stylesheet" type="text/css" href="docstyle.css" />|' index.html
          sed -i 's/<title>dbt Docs<\/title>/<title>MITOS Data Catalog<\/title>/g' index.html
          sed -i 's|<link rel="shortcut icon" [^>]*>|<link rel="icon" href="MITOS_globe.png" />|g' index.html
          mkdir ${{ github.workspace }}/docs
          cp *.json *.html *.png *.css graph.gpickle ${{ github.workspace }}/docs
          ls -ltra ${{ github.workspace }}/docs

      - name: "Step 07 - Upload pages to artifact"
        id: step-07
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/docs

  # Deploy to Github pages
  deploy-to-github-pages:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
